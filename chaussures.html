<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaussures - ALLIBABA.COM ✨❤️🇨🇳-MARKET</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card:hover { transform: scale(1.02); transition: 0.2s; }
    </style>
</head>
<body>
    <div class="container mt-4">
        <a href="index.html" class="btn btn-secondary mb-3">← Retour</a>
        <h2 class="text-center mb-4">👟 Chaussures</h2>
        
        <div class="row">
            
            <!-- PRODUIT 1 -->
            <div class="col-md-4 mb-4">
                <div class="card h-100">
                    <img src="https://via.placeholder.com/400x300.png?text=Nike+Air+Force" class="card-img-top" alt="Nike Air Force">
                    <div class="card-body">
                        <h5 class="card-title">Nike Air Force 1</h5>
                        <p class="card-text">Blanc, taille 40-45. Qualité premium.</p>
                        <p class="fw-bold text-primary">25 000 FCFA</p>
                        <a href="commande.html?produit=Nike%20Air%20Force%201&montant=25000" class="btn btn-success w-100">Commander</a>
                    </div>
                </div>
            </div>

            <!-- PRODUIT 2 -->
            <div class="col-md-4 mb-4">
                <div class="card h-100">
                    <img src="https://via.placeholder.com/400x300.png?text=Adidas+Stan+Smith" class="card-img-top" alt="Adidas Stan Smith">
                    <div class="card-body">
                        <h5 class="card-title">Adidas Stan Smith</h5>
                        <p class="card-text">Blanc/Vert, confortable et tendance.</p>
                        <p class="fw-bold text-primary">22 000 FCFA</p>
                        <a href="commande.html?produit=Adidas%20Stan%20Smith&montant=22000" class="btn btn-success w-100">Commander</a>
                    </div>
                </div>
            </div>

            <!-- PRODUIT 3 -->
            <div class="col-md-4 mb-4">
                <div class="card h-100">
                    <img src="https://via.placeholder.com/400x300.png?text=Jordan+1" class="card-img-top" alt="Jordan 1">
                    <div class="card-body">
                        <h5 class="card-title">Nike Jordan 1</h5>
                        <p class="card-text">Rouge/Noir, édition limitée.</p>
                        <p class="fw-bold text-primary">35 000 FCFA</p>
                        <a href="commande.html?produit=Nike%20Jordan%201&montant=35000" class="btn btn-success w-100">Commander</a>
                    </div>
                </div>
            </div>

        </div>
    </div>
</body>
</html>
