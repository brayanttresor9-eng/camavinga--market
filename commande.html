<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commander - ALLIBABA.COM ✨❤️🇨🇳-MARKET</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5" style="max-width: 600px;">
        <h1 class="text-center">𝐂𝐎𝐌𝐄𝐍𝐓 𝐏𝐀𝐒𝐄𝐑 UNE COMMANDE?</h1>
        <form class="mt-4 p-4 border rounded" id="commandeForm">
            <div class="mb-3">
                <label class="form-label">𝐀𝐫𝐭𝐢𝐜𝐥𝐞 :</label>
                <input type="text" class="form-control" name="article" id="article" readonly>
            </div>
            <div class="mb-3">
                <label class="form-label">𝐍𝐨𝐦 :</label>
                <input type="text" class="form-control" id="nom" placeholder="Votre nom" required>
            </div>
            <div class="mb-3">
                <label class="form-label">𝐏𝐫𝐞́𝐧𝐨𝐦 :</label>
                <input type="text" class="form-control" id="prenom" placeholder="Votre prénom" required>
            </div>
            <div class="mb-3">
                <label class="form-label">𝐕𝐢𝐥𝐞 :</label>
                <input type="text" class="form-control" id="ville" placeholder="Douala" required>
            </div>
            <div class="mb-3">
                <label class="form-label">𝐐𝐮𝐚𝐫𝐭𝐢𝐞𝐫 :</label>
                <input type="text" class="form-control" id="quartier" placeholder="Bonamoussadi" required>
            </div>
            <div class="mb-3">
                <label class="form-label">𝐍𝐮𝐦𝐞́𝐫𝐨 𝐝𝐞 𝐭𝐞𝐥𝐞́𝐩𝐡𝐨𝐧𝐞 :</label>
                <input type="tel" class="form-control" id="telephone" placeholder="+237 6XX XXX" required>
            </div>
            <div class="mb-3">
                <label class="form-label">𝐌𝐨𝐧𝐭𝐚𝐧𝐭 𝐚̀ 𝐩𝐚𝐲𝐞𝐫 :</label>
                <input type="text" class="form-control" name="montant" id="montant" readonly>
            </div>

            <!-- MODES DE PAIEMENT -->
            <div class="mb-3">
                <label class="form-label fw-bold">Mode de paiement :</label>
                
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="paiement" id="cash" value="Cash à la livraison" checked>
                    <label class="form-check-label" for="cash">💵 Cash à la livraison</label>
                </div>
                
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="paiement" id="orange" value="Orange Money">
                    <label class="form-check-label" for="orange">🟠 Orange Money</label>
                </div>
                
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="paiement" id="mtn" value="MTN Mobile Money">
                    <label class="form-check-label" for="mtn">🟡 MTN Mobile Money</label>
                </div>
                
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="paiement" id="mpesa" value="M-Pesa">
                    <label class="form-check-label" for="mpesa">🟢 M-Pesa</label>
                </div>
                
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="paiement" id="airtel" value="Airtel Money">
                    <label class="form-check-label" for="airtel">🔴 Airtel Money</label>
                </div>
                
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="paiement" id="wave" value="Wave">
                    <label class="form-check-label" for="wave">🔵 Wave</label>
                </div>
                
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="paiement" id="moov" value="Moov Money">
                    <label class="form-check-label" for="moov">🟣 Moov Money</label>
                </div>
                
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="paiement" id="togocel" value="Togocel Money">
                    <label class="form-check-label" for="togocel">🔵 Togocel Money</label>
                </div>
                
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="paiement" id="virement" value="Virement bancaire">
                    <label class="form-check-label" for="virement">🏦 Virement bancaire</label>
                </div>
            </div>

            <button type="button" class="btn btn-success w-100" onclick="envoyerWhatsApp()">VALIDER SUR WHATSAPP</button>
            <div class="alert alert-info mt-3">
                <strong>Livraison :</strong> 2 à 3 jours après validation du paiement
            </div>
        </form>
    </div>

    <script>
        // Pré-remplit article et montant depuis l'URL
        const urlParams = new URLSearchParams(window.location.search);
        document.getElementById('article').value = urlParams.get('produit') || '';
        document.getElementById('montant').value = urlParams.get('montant') ? urlParams.get('montant') + ' FCFA' : '';

        function envoyerWhatsApp() {
            const article = document.getElementById('article').value;
            const montant = document.getElementById('montant').value;
            const nom = document.getElementById('nom').value;
            const prenom = document.getElementById('prenom').value;
            const ville = document.getElementById('ville').value;
            const quartier = document.getElementById('quartier').value;
            const telephone = document.getElementById('telephone').value;
            const paiement = document.querySelector('input[name="paiement"]:checked').value;

            if(!nom || !prenom || !ville || !quartier || !telephone){
                alert("Remplis tous les champs stp !");
                return;
            }

            const msg = `Bonjour CAMAVINGA-MARKET 👋
Nouvelle commande :

📦 Article : ${article}
💰 Montant : ${montant}
👤 Nom : ${prenom} ${nom}
📍 Ville : ${ville}
🏘️ Quartier : ${quartier}
📞 Téléphone : ${telephone}
💳 Paiement : ${paiement}

Je confirme ma commande !`;

            window.open(`https://wa.me/27616873119?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
</html>
