<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voitures - CAMAVINGA-MARKET</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a href="index.html" class="navbar-brand">← BRAYANT MARKET</a>
            <span class="text-white">🚗 Voitures</span>
        </div>
    </nav>

    <div class="container mt-4">
        <h1>Voitures Disponibles</h1>
        
        <!-- FILTRES -->
        <div class="row mb-4 p-3 bg-light rounded">
            <div class="col-md-6">
                <label class="fw-bold">Marque :</label>
                <select id="filtreMarque" class="form-select" onchange="filtrerVoitures()">
                    <option value="all">Toutes les marques</option>
                    <option value="Toyota">Toyota</option>
                    <option value="Mercedes">Mercedes</option>
                </select>
            </div>
            <div class="col-md-6">
                <label class="fw-bold">Prix max :</label>
                <select id="filtrePrix" class="form-select" onchange="filtrerVoitures()">
                    <option value="all">Tous les prix</option>
                    <option value="3000000">Moins de 3 000 000 FCFA</option>
                    <option value="5000000">Moins de 5 000 000 FCFA</option>
                </select>
            </div>
        </div>

        <!-- VOITURE 1 -->
        <div class="row" id="listeVoitures">
            <div class="col-md-4 mb-4 voiture-item" data-marque="Toyota" data-prix="4500000">
                <div class="card">
                    <img src="images/corolla.jpg" class="card-img-top" style="height:200px; object-fit:cover;">
                    <div class="card-body">
                        <h5>Toyota Corolla 2018</h5>
                        <p>
                            <span class="badge bg-success">Essence</span>
                            <span class="badge bg-info">Auto</span>
                        </p>
                        <h4 class="text-primary">4 500 000 FCFA</h4>
                        <a href="commande.html?produit=Toyota Corolla 2018&montant=4500000" class="btn btn-primary w-100">Commander</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function filtrerVoitures() {
            const marqueChoisie = document.getElementById('filtreMarque').value;
            const prixMax = document.getElementById('filtrePrix').value;
            const voitures = document.querySelectorAll('.voiture-item');
            voitures.forEach(voiture => {
                const marqueVoiture = voiture.getAttribute('data-marque');
                const prixVoiture = parseInt(voiture.getAttribute('data-prix'));
                const matchMarque = marqueChoisie === 'all' || marqueVoiture === marqueChoisie;
                const matchPrix = prixMax === 'all' || prixVoiture <= parseInt(prixMax);
                voiture.style.display = (matchMarque && matchPrix) ? 'block' : 'none';
            });
        }
    </script>
</body>
</html>
